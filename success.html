<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed | Laos Local Tour</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Flags & Style -->    <link rel="stylesheet" href="css/style.css">    <style>
        .success-container {
            padding-top: 140px;
            padding-bottom: 100px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(6, 95, 70, 0.8) 0%, rgba(13, 148, 136, 0.8) 100%),
                url('https://images.unsplash.com/photo-1540304620021-d779fec5a918?auto=format&fit=crop&q=80&w=2000') center/cover fixed;
            position: relative;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 60px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3), 0 0 40px rgba(255, 255, 255, 0.1) inset;
            text-align: center;
            max-width: 650px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            z-index: 10;
        }

        .success-icon {
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            font-size: 3.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.4);
            border: 6px solid #ecfdf5;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
            }
        }

        .success-title {
            font-size: 2.8rem;
            color: var(--text-main);
            margin-bottom: 15px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        .success-subtitle {
            font-size: 1.35rem;
            color: var(--primary);
            margin-bottom: 25px;
            font-weight: 600;
        }

        .success-text {
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 35px;
            font-size: 1.05rem;
        }

        .booking-details-box {
            background: #f8fafc;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 40px;
            text-align: left;
            border: 1px solid #e2e8f0;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .detail-row.total {
            border-top: 1px dashed #cbd5e1;
            padding-top: 15px;
            margin-top: 15px;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .receipt-action-card {
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border: 1px solid #fde68a;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 40px;
            text-align: left;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.1);
        }

        .success-actions {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }

        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>

<body class="premium-theme">

        <header class="site-header site-header--glass">
        <div class="container nav-bar">
            <div class="logo-block">
                <a href="index.html" class="logo">
                    <img src="images/logo.jpeg" alt="Laos Local Tour" class="logo-img">
                </a>
            </div>

                        <nav class="main-nav" id="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="tours.html">Tours</a></li>
                    <li><a href="about.html">About</a></li>
                    
            </nav>

            <div class="menu-toggle" id="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="success-container">
        <div class="success-card reveal active">
            <div class="success-icon" style="background: var(--primary-light); color: var(--primary);">
                <i class="fas fa-paper-plane"></i>
            </div>

            <h1 class="success-title">Booking Request Sent!</h1>
            <p class="success-subtitle">Sabaidee! We have received your inquiry.</p>

            <p class="success-text">
                Your request is being checked by our team. We will contact you shortly via WhatsApp or email to confirm
                availability and finalize the details.
            </p>

            <div id="wa-countdown-box"
                style="margin-bottom: 35px; padding: 18px; background: #ecfdf5; border: 1px solid #d1fae5; border-radius: 16px; color: #065f46; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                <i class="fab fa-whatsapp" style="font-size: 1.4rem; color: #25D366;"></i>
                <span>Forwarding to WhatsApp in <span id="wa-counter" style="color: var(--primary);">5</span>s...</span>
            </div>

            <div class="booking-details-box">
                <div class="detail-row"
                    style="border-bottom: 1px solid #cbd5e1; padding-bottom: 15px; margin-bottom: 15px;">
                    <span style="font-weight: 600; color: var(--text-main);">Booking
                        ID</span>
                    <strong id="display-booking-id"
                        style="color: var(--secondary); font-size: 1.1rem;">LST-2026-XXXX</strong>
                </div>
            </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const displayBookingId = document.getElementById('display-booking-id');
            const bookingId = localStorage.getItem('current_booking_id') || 'LST-2026-XXXX';
            if (displayBookingId) displayBookingId.textContent = bookingId;

            const custName = localStorage.getItem('cust_name') || '';
            const custWA = localStorage.getItem('cust_whatsapp') || '';
            const prodName = localStorage.getItem('selected_product_name') || '';
            const date = localStorage.getItem('selected_product_date') || '';
            const guests = localStorage.getItem('selected_product_guests') || '';
            const total = localStorage.getItem('due_now_value') || '';

            const waNumber = '8562098457614';
            let message = `Hello, I am ${custName || 'a guest'}. Booking ID: ${bookingId}`;
            if (prodName) message += `\nTour: ${prodName}`;
            if (date) message += `\nDate: ${date}`;
            if (guests) message += `\nGuests: ${guests}`;
            if (total) message += `\nTotal: ${total}`;
            message += `\nEmail: ${localStorage.getItem('cust_email') || ''}`;
            const waUrl = `https://wa.me/${waNumber}?text=${encodeURIComponent(message)}`;

            let timeLeft = 5;
            const counterEl = document.getElementById('wa-counter');
            if (counterEl) counterEl.textContent = timeLeft;
            const countdownInterval = setInterval(() => {
                timeLeft--;
                if (counterEl) counterEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    window.location.href = waUrl;
                    const box = document.getElementById('wa-countdown-box');
                    if (box) box.innerHTML = '<i class="fas fa-check-circle"></i> Redirecting...';
                }
            }, 1000);

            setTimeout(() => {
                if (typeof showToast === 'function') showToast('Success!', 'Your booking inquiry was sent successfully.', 'success', 5000);
            }, 800);

            const keys = ['current_booking_id', 'receipt_uploaded', 'temp_receipt_base64', 'payment_mode', 'due_now_value', 'balance_value', 'cust_name', 'cust_whatsapp', 'cust_email'];
            keys.forEach(k => localStorage.removeItem(k));
        });
    </script>
</body>

</html>
