<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header | Laos Local Tour</title>
    <meta name="description" content="Site header example for Laos Local Tour.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="premium-theme">
    <header class="site-header site-header--glass">
        <div class="container nav-bar">
            <div class="logo-block">
                <a href="index.html" class="logo">
                    <img src="images/logo.jpeg" alt="Laos Local Tour" class="logo-img">
                </a>
            </div>

            <nav class="main-nav" id="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="tours.html">Tours</a></li>
                    <li><a href="about.html">About</a></li>
                    
                </ul>
            </nav>

            <div class="menu-toggle" id="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main>
        <section class="section-padding">
            <div class="container">
                <div class="text-center">
                    <h1>Shared Header Page</h1>
                    <p>This page shows the common site header and navigation used across the Laos Local Tour website.</p>
                    <div class="btn-group" style="justify-content:center; gap:12px; display:flex; flex-wrap:wrap; margin-top:24px;">
                        <a href="index.html" class="btn btn-outline btn-sm">Home</a>
                        <a href="tours.html" class="btn btn-outline btn-sm">Tours</a>
                        <a href="about.html" class="btn btn-outline btn-sm">About</a>
                        <a href="checkout.html" class="btn btn-primary btn-sm btn-book-now">Book Now</a>
                        <a href="footer.html" class="btn btn-glass btn-sm">Footer Page</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>

</html>
